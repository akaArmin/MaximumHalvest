name: Tausch-Tracker

on:
  schedule:
    # Mo–Fr alle 30 Min zwischen 09:00–17:30 Uhr MEZ (= 08:00–16:30 UTC)
    # NYSE öffnet 15:30 MEZ – daher läuft der Tracker ganztags für Xetra + NYSE
    - cron: '0,30 8-16 * * 1-5'

  # Manuell über GitHub UI startbar (zum Testen)
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest

    # Schreibrechte für git push (best.json)
    permissions:
      contents: write

    steps:
      - name: Repository laden
        uses: actions/checkout@v4
        with:
          # Eigenes Token damit der Bot-Push weitere Workflows triggern kann
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Tracker ausführen
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python tracker.py

      - name: Geänderte Dateien committen (best.json, history.json)
        run: |
          git config user.name  "Tracker Bot"
          git config user.email "tracker-bot@noreply.github.com"
          git add -A
          # Nur committen wenn es wirklich Änderungen gibt
          git diff --cached --quiet || git commit -m "chore: update tracker data [skip ci]"
          git push
